name: deploy companion pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/companion-pages.yml"
      - "docs/operators/fixtures/miro-web-sdk-companion-v1.json"
      - "pyproject.toml"
      - "src/schauwerk/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: companion-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Install Schauwerk
        run: python -m pip install .
      - name: Build deterministic companion bundle
        run: |
          schauwerk miro companion build \
            docs/operators/fixtures/miro-web-sdk-companion-v1.json \
            --output-dir _site
          rm -f _site/_headers
          touch _site/.nojekyll
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy companion
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
